services:
  traefik:
    image: traefik:v3.0
    container_name: traefik

    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # HTTPS
      - "--certificatesresolvers.myresolver.acme.email=${EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=cloudflare"

    environment:
      - CF_DNS_API_TOKEN=${DOMAIN_API_KEY}

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml
      - ./letsencrypt:/letsencrypt

    networks:
      - web

  db:
    image: mysql:8.0.36
    container_name: datile-mysql
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

    networks:
      - web

  backend:
    build:
      context: .
    container_name: datile-backend
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}

    networks:
      - web

  frontend:
    build:
      context: ./frontend
    container_name: datile-frontend
    restart: unless-stopped

    depends_on:
      - backend

    networks:
      - web

volumes:
  mysql_data:

networks:
  web:
